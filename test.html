<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3 · M5 — Kendini Test Et</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --sidebar-bg: #1a2744;
    --sidebar-hover: #243660;
    --accent: #2e4a8a;
    --accent-light: #e8eef8;
    --correct: #1a7f4b;
    --correct-bg: #eaf6ef;
    --wrong: #c0392b;
    --wrong-bg: #fdf0ee;
    --text: #1c2b3a;
    --muted: #7a8fa6;
    --border: #dde4ed;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --nav-w: 220px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }
  #screen-quiz.active { height: 100vh; overflow: hidden; }

  /* ── HEADER ── */
  .t-header {
    background: var(--sidebar-bg);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    gap: 12px;
  }
  .t-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .t-header h1 { font-size: 1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    color: #8ab4f8; font-size: 0.85rem; padding: 0;
    opacity: 0.8; white-space: nowrap; font-family: inherit;
  }
  .back-btn:hover { opacity: 1; }

  /* ── SELECT SCREEN ── */
  #screen-select {
    align-items: center;
    padding: 0 20px 60px;
  }
  .select-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 580px;
    padding-top: 40px;
  }
  .select-hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .select-hero .logo { font-size: 2.4rem; margin-bottom: 12px; }
  .select-hero h2 { font-size: 1.45rem; font-weight: 700; color: var(--sidebar-bg); }
  .select-hero p { margin-top: 8px; font-size: 0.9rem; color: var(--muted); }

  .week-select-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    width: 100%;
  }
  .week-select-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: var(--shadow);
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    text-align: left;
    font-family: inherit;
    color: var(--text);
  }
  .week-select-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--card-color, var(--accent));
  }
  .week-select-card:hover {
    border-color: var(--card-color, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.13);
  }
  .wsc-label {
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--card-color, var(--accent));
  }
  .wsc-title { font-size: 1.2rem; font-weight: 700; color: var(--sidebar-bg); }
  .wsc-sub { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .wsc-start {
    margin-top: 8px;
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.76rem; font-weight: 700;
    padding: 5px 12px; border-radius: 20px;
    background: var(--card-color, var(--accent));
    color: #fff; width: fit-content;
  }

  /* ── MULTI-SELECT CARD STATE ── */
  .week-select-card.selected {
    border-color: var(--card-color, var(--accent));
    background: #f0f5ff;
    box-shadow: 0 0 0 3px rgba(46,74,138,0.14), var(--shadow);
  }
  .week-select-card.wcard-disabled {
    opacity: 0.42; cursor: not-allowed; pointer-events: none;
  }
  .wsc-check {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--card-color, var(--accent));
    color: #fff; font-size: 0.72rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.4);
    transition: opacity 0.18s cubic-bezier(.4,0,.2,1), transform 0.18s cubic-bezier(.4,0,.2,1);
    pointer-events: none;
  }
  .week-select-card.selected .wsc-check { opacity: 1; transform: scale(1); }

  .select-devam-wrap {
    width: 100%; margin-top: 22px;
    display: flex; justify-content: flex-end;
  }
  .devam-btn {
    padding: 13px 32px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    opacity: 0; pointer-events: none;
    transition: background 0.15s, transform 0.12s, opacity 0.2s;
    box-shadow: 0 4px 14px rgba(46,74,138,0.25);
  }
  .devam-btn.visible { opacity: 1; pointer-events: auto; }
  .devam-btn:hover { background: #243a7a; transform: translateY(-1px); }

  /* ── CONFIG SCREEN ── */
  #screen-config { align-items: center; }
  .config-body {
    width: 100%; max-width: 540px;
    padding: 32px 24px 60px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .config-section-title {
    font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 4px;
  }
  .config-week-rows { display: flex; flex-direction: column; gap: 14px; }
  .config-week-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    box-shadow: var(--shadow);
    border-left: 4px solid var(--row-color, var(--accent));
  }
  .config-week-info { flex: 1; min-width: 0; }
  .config-week-name {
    font-size: 0.95rem; font-weight: 700; color: var(--sidebar-bg);
  }
  .config-week-sub {
    font-size: 0.74rem; color: var(--muted); margin-top: 2px;
  }
  .config-count-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .config-count-input {
    width: 72px; padding: 8px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 0.92rem; font-family: inherit;
    text-align: center; outline: none; color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
  }
  .config-count-input:focus { border-color: var(--accent); }
  .config-count-input.input-error { border-color: #c0392b; background: #fff5f5; }
  .config-count-max { font-size: 0.7rem; color: var(--muted); }
  .config-count-err { font-size: 0.7rem; color: #c0392b; display: none; }
  .config-count-input.input-error + .config-count-max { display: none; }
  .config-count-input.input-error ~ .config-count-err { display: block; }

  /* Toggle switch */
  .config-toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    box-shadow: var(--shadow);
  }
  .config-toggle-label { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .config-toggle-desc { font-size: 0.76rem; color: var(--muted); margin-top: 3px; }
  .toggle-switch {
    position: relative; width: 46px; height: 26px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; background: #c8d4e0;
    border-radius: 26px; cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 20px; height: 20px; border-radius: 50%;
    background: #fff; top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

  .config-launch-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(46,74,138,0.25);
    transition: background 0.15s, transform 0.1s;
  }
  .config-launch-btn:hover { background: #243a7a; transform: translateY(-1px); }

  /* ── QUIZ SCREEN ── */
  #quiz-header-right {
    display: flex; align-items: center; gap: 10px; flex-shrink: 0;
  }
  #progress-wrap {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; color: #aac;
  }
  #progress-track {
    width: 110px; height: 6px;
    background: #2e4a8a; border-radius: 3px; overflow: hidden;
  }
  #progress-fill { height: 100%; background: #4caf88; border-radius: 3px; transition: width 0.3s; }

  #nav-toggle {
    background: rgba(255,255,255,0.12); border: none; color: #fff;
    font-size: 0.78rem; padding: 6px 10px; border-radius: 6px;
    cursor: pointer; white-space: nowrap; font-family: inherit;
    display: none;
  }
  #nav-toggle:hover { background: rgba(255,255,255,0.2); }

  .quiz-layout { display: flex; flex: 1; overflow: hidden; }

  /* ── NAV PANEL ── */
  #nav-panel {
    width: var(--nav-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 14px;
    flex-shrink: 0;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #2e4a8a transparent;
  }
  #nav-panel::-webkit-scrollbar { width: 4px; }
  #nav-panel::-webkit-scrollbar-thumb { background: #2e4a8a; border-radius: 2px; }

  .nav-panel-title {
    font-size: 0.62rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #6a7fa0; padding-bottom: 10px;
    border-bottom: 1px solid #2e3f60; flex-shrink: 0;
  }

  #q-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .q-nav-btn {
    aspect-ratio: 1; border: none; border-radius: 5px;
    background: #2a3a5a; color: #6a7fa0;
    font-size: 0.67rem; font-weight: 700;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
    padding: 0; font-family: inherit;
  }
  .q-nav-btn:hover { background: #3a5080; color: #d0d8f0; }
  .q-nav-btn.answered { background: #1e4d36; color: #5dba8a; }
  .q-nav-btn.current { background: #fff; color: #1a2744; transform: scale(1.1); box-shadow: 0 1px 6px rgba(0,0,0,0.3); }
  .q-nav-btn.current.answered { background: #eafff5; color: #1a4d36; }

  #finish-btn {
    flex-shrink: 0; width: 100%;
    padding: 11px; background: #c0392b;
    color: #fff; border: none; border-radius: 8px;
    font-size: 0.88rem; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: background 0.15s, transform 0.1s;
    margin-top: auto;
  }
  #finish-btn:hover { background: #a93226; transform: translateY(-1px); }

  /* ── QUESTION AREA ── */
  #q-main {
    flex: 1; overflow-y: auto; padding: 32px;
    scrollbar-width: thin; scrollbar-color: #c0ccd8 transparent;
    display: flex; flex-direction: column; align-items: center;
  }
  #q-main::-webkit-scrollbar { width: 6px; }
  #q-main::-webkit-scrollbar-thumb { background: #c0ccd8; border-radius: 3px; }

  #q-card { width: 100%; max-width: 760px; }

  .q-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .q-num-badge {
    background: var(--accent); color: #fff;
    font-size: 0.75rem; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
  }
  .q-source-badge {
    background: #f0f4f8; border: 1px solid #c8d4e0; color: #5a6f88;
    font-size: 0.7rem; font-weight: 600;
    padding: 3px 9px; border-radius: 20px; font-family: monospace;
  }
  .q-text { font-size: 1rem; line-height: 1.72; color: var(--text); margin-bottom: 24px; }

  .q-options { display: flex; flex-direction: column; gap: 10px; }
  .q-option {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 13px 16px;
    border: 2px solid var(--border); border-radius: var(--radius);
    background: var(--surface); cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    font-family: inherit; font-size: 0.92rem; color: var(--text);
    text-align: left; width: 100%;
  }
  .q-option:hover { border-color: var(--accent); background: var(--accent-light); }
  .q-option.selected { border-color: var(--accent); background: var(--accent-light); }
  .q-opt-letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: 0.78rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .q-option.selected .q-opt-letter { background: #1e3880; }
  .q-opt-text { line-height: 1.5; padding-top: 3px; }

  .q-nav-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .q-nav-arrow {
    background: none; border: 2px solid var(--border); border-radius: 8px;
    padding: 8px 20px; font-size: 0.88rem; font-weight: 600;
    color: var(--accent); cursor: pointer; font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .q-nav-arrow:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .q-nav-arrow:disabled { opacity: 0.32; cursor: not-allowed; }
  .q-nav-pos { font-size: 0.82rem; color: var(--muted); }

  /* ── CONFIRM MODAL ── */
  #confirm-modal {
    display: none; position: fixed; inset: 0;
    z-index: 1000; align-items: center; justify-content: center;
  }
  #confirm-modal.open { display: flex; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
  .modal-box {
    position: relative; background: var(--surface);
    border-radius: 14px; padding: 32px; max-width: 380px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25); text-align: center;
  }
  .modal-box h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
  .modal-box p { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }
  .modal-cancel {
    padding: 10px 24px; border: 2px solid var(--border); border-radius: 8px;
    background: none; font-size: 0.9rem; font-weight: 600;
    color: var(--muted); cursor: pointer; font-family: inherit;
    transition: border-color 0.15s;
  }
  .modal-cancel:hover { border-color: var(--muted); }
  .modal-finish {
    padding: 10px 24px; border: none; border-radius: 8px;
    background: #c0392b; color: #fff;
    font-size: 0.9rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
  }
  .modal-finish:hover { background: #a93226; }

  /* ── RESULTS SCREEN ── */
  #screen-results { align-items: center; }
  .results-body { width: 100%; max-width: 760px; padding: 32px 24px 60px; }
  .results-title {
    text-align: center; font-size: 1.35rem; font-weight: 700;
    color: var(--sidebar-bg); margin-bottom: 28px;
  }

  .score-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 14px; margin-bottom: 20px;
  }
  .score-card {
    background: var(--surface); border-radius: var(--radius);
    padding: 20px; text-align: center;
    box-shadow: var(--shadow); border-top: 4px solid transparent;
  }
  .score-card.sc-correct { border-top-color: var(--correct); }
  .score-card.sc-wrong { border-top-color: #c0392b; }
  .score-card.sc-blank { border-top-color: var(--muted); }
  .score-number { font-size: 2.2rem; font-weight: 800; line-height: 1; margin-bottom: 6px; }
  .sc-correct .score-number { color: var(--correct); }
  .sc-wrong .score-number { color: #c0392b; }
  .sc-blank .score-number { color: var(--muted); }
  .score-label { font-size: 0.76rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .score-summary {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 28px;
    text-align: center; font-size: 0.88rem; color: var(--muted);
    box-shadow: var(--shadow);
  }
  .score-pct { font-size: 1.3rem; font-weight: 800; color: var(--accent); display: block; margin-bottom: 4px; }

  .retry-btn {
    padding: 11px 28px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; font-family: inherit; transition: background 0.15s;
  }
  .retry-btn:hover { background: #243a7a; }

  .wrong-section-title {
    font-size: 1rem; font-weight: 700; color: var(--text);
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .wrong-count-badge {
    background: #fdf0ee; color: #c0392b; border: 1px solid #f0b8b0;
    font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
  }

  /* ── REVIEW CARD WRAPPER ── */
  .review-q-wrap {
    margin-bottom: 20px; border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
    border: 1.5px solid var(--border); border-left: 4px solid #c0392b;
    background: var(--surface);
  }
  .review-q-inner { padding: 24px; }

  /* ── QUIZ CARD STYLES (mirrored from quiz.html) ── */
  .card-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
  .card-num { background:var(--accent); color:#fff; font-size:0.75rem; font-weight:700; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .card-source { background:#f0f4f8; border:1px solid #c8d4e0; color:#5a6f88; font-size:0.7rem; font-weight:600; padding:3px 9px; border-radius:20px; font-family:monospace; white-space:nowrap; }
  .card-question { font-size:1.05rem; font-weight:600; line-height:1.55; color:var(--text); margin-top:6px; margin-bottom:20px; }

  .options-grid { display:flex; flex-direction:column; gap:8px; margin-bottom:24px; }
  .option { display:flex; align-items:flex-start; gap:12px; padding:12px 16px; border-radius:var(--radius); border:1.5px solid var(--border); background:var(--surface); font-size:0.9rem; line-height:1.45; cursor:default; }
  .option.revealed-correct { border-color:var(--correct); background:var(--correct-bg); }
  .option.revealed-wrong   { border-color:#c0392b; background:#fdf0ee; }
  .option-letter { font-weight:700; font-size:0.8rem; min-width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--accent-light); color:var(--accent); flex-shrink:0; margin-top:1px; }
  .option.revealed-correct .option-letter { background:var(--correct); color:#fff; }
  .option.revealed-wrong   .option-letter { background:#c0392b; color:#fff; }
  .option-text { flex:1; }
  .option-inline-analysis { display:none; margin-top:6px; padding:8px 10px; background:rgba(0,0,0,0.04); border-radius:6px; font-size:0.82rem; line-height:1.55; color:#2c3e50; border-left:3px solid #aab; }
  .option.revealed-correct .option-inline-analysis { border-left-color:var(--correct); background:rgba(26,127,75,0.06); }
  .option.revealed-wrong   .option-inline-analysis { border-left-color:#c0392b; background:rgba(192,57,43,0.06); }
  .option.show-analysis .option-inline-analysis { display:block; }

  .no-exp-notice { background:#fff8e6; border:1.5px solid #f0c060; border-radius:var(--radius); padding:14px 18px; font-size:0.88rem; color:#7a5a00; margin-bottom:24px; }
  .note-box { background:#f5f0ff; border:1.5px solid #c8a8f0; border-radius:var(--radius); padding:12px 16px; font-size:0.85rem; color:#4a2880; margin-bottom:20px; line-height:1.6; }
  .note-box::before { content:"📝 Not: "; font-weight:700; }

  .accordion { display:flex; flex-direction:column; gap:10px; }
  .acc-item { border:1.5px solid var(--border); border-radius:var(--radius); background:var(--surface); overflow:hidden; box-shadow:var(--shadow); }
  .acc-trigger { width:100%; display:flex; align-items:center; justify-content:space-between; padding:14px 18px; background:none; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; color:var(--text); text-align:left; transition:background 0.15s; font-family:inherit; }

  .opt-analysis-list { display:flex; flex-direction:column; gap:8px; margin-top:4px; }

</style>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const WEEKS = [
  { hafta: 'H1', file: 'd3m5h1_questions.json', label: 'Hafta 1', count: 111, color: '#6a9fd8', sub: 'Nefroloji · Fizyopatoloji' },
  { hafta: 'H2', file: 'd3m5h2_questions.json', label: 'Hafta 2', count: 85,  color: '#e8854a', sub: 'Gastro · Patoloji · Nefroloji · Genetik' },
  { hafta: 'H3', file: 'questions.json',         label: 'Hafta 3', count: 94,  color: '#2e4a8a', sub: 'Fizyopatoloji · Patoloji · Gastro · Farmakoloji' },
  { hafta: 'H4', file: 'd3m5h4_questions.json', label: 'Hafta 4', count: 0,   color: '#8b3db8', sub: 'Yakında', disabled: true },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let allQuestions        = [];
let userAnswers         = {};   // { questionId: 'a'|'b'|'c'|'d'|'e' }
let currentIdx          = 0;
let currentWeek         = null; // kept for session-compat (single-week legacy)
let wrongItemsStore     = [];   // [{ q, userAnswer, correctAnswer }]
let reviewIdx           = 0;
let selectedWeeks       = new Set();              // Set of hafta strings
let selectedWeekConfigs = [];  // [{ week: WEEKS[i], count: number }]
let randomize           = false;

// ── SESSION PERSISTENCE ───────────────────────────────────────────────────────
const SK = 'd3m5_state', SKQ = 'd3m5_questions';

function saveSession(finished = false) {
  try {
    if (!sessionStorage.getItem(SKQ)) {
      sessionStorage.setItem(SKQ, JSON.stringify(allQuestions));
    }
    sessionStorage.setItem(SK, JSON.stringify({
      currentWeek, selectedWeekConfigs, randomize,
      userAnswers, currentIdx, finished
    }));
  } catch (e) { /* quota exceeded — silently ignore */ }
}

function clearSession() {
  sessionStorage.removeItem(SK);
  sessionStorage.removeItem(SKQ);
}

function quizTitle() {
  if (selectedWeekConfigs.length > 0) {
    return selectedWeekConfigs.map(c => c.week.hafta).join(' · ') + ' Sınavı';
  }
  return currentWeek ? currentWeek.hafta + ' Sınavı' : 'Sınav';
}

function restoreSession() {
  const raw  = sessionStorage.getItem(SK);
  const rawQ = sessionStorage.getItem(SKQ);
  if (!raw || !rawQ) return false;
  try {
    const s = JSON.parse(raw);
    const q = JSON.parse(rawQ);
    const hasConfig = Array.isArray(s.selectedWeekConfigs) && s.selectedWeekConfigs.length > 0;
    if (!hasConfig && !s.currentWeek) { clearSession(); return false; }
    if (!Array.isArray(q) || !q.length) { clearSession(); return false; }

    currentWeek         = s.currentWeek || null;
    selectedWeekConfigs = s.selectedWeekConfigs || [];
    randomize           = s.randomize || false;
    allQuestions        = q;
    userAnswers         = s.userAnswers || {};
    currentIdx          = s.currentIdx  || 0;

    if (s.finished) {
      wrongItemsStore = [];
      let correct = 0, wrong = 0, blank = 0;
      allQuestions.forEach(qItem => {
        const ua = userAnswers[qItem.id];
        const ca = (qItem.correct_answer || '').toLowerCase();
        if (!ua || !ca) { blank++; }
        else if (ua === ca) { correct++; }
        else { wrong++; wrongItemsStore.push({ q: qItem, userAnswer: ua, correctAnswer: ca }); }
      });
      buildResultsScreen(correct, wrong, blank, wrongItemsStore);
      showScreen('results');
    } else {
      document.getElementById('quiz-title').textContent = `🎯 ${quizTitle()}`;
      buildNavGrid();
      goToQuestion(currentIdx);
      updateProgress();
      if (isMobile()) document.getElementById('mob-nav').style.display = 'flex';
      showScreen('quiz');
    }
    return true;
  } catch (e) { clearSession(); return false; }
}

// ── SCREEN MANAGEMENT ─────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ── BUILD WEEK SELECTOR ───────────────────────────────────────────────────────
function buildWeekSelect() {
  const grid = document.getElementById('week-select-grid');
  grid.innerHTML = '';
  WEEKS.forEach(w => {
    const card = document.createElement('button');
    card.className = 'week-select-card' + (w.disabled ? ' wcard-disabled' : '');
    card.dataset.hafta = w.hafta;
    card.style.setProperty('--card-color', w.color);
    card.innerHTML = `
      <span class="wsc-check">✓</span>
      <span class="wsc-label">${w.label}</span>
      <span class="wsc-title">${w.hafta}</span>
      <span class="wsc-sub">${w.sub}</span>
      ${w.disabled
        ? `<span class="wsc-start" style="background:#ccc;color:#666">⏳ Yakında</span>`
        : `<span class="wsc-start">${w.count} soru</span>`}`;
    if (!w.disabled) {
      card.addEventListener('click', () => toggleWeekCard(card, w));
    }
    grid.appendChild(card);
  });
}

function toggleWeekCard(card, w) {
  if (selectedWeeks.has(w.hafta)) {
    selectedWeeks.delete(w.hafta);
    card.classList.remove('selected');
  } else {
    selectedWeeks.add(w.hafta);
    card.classList.add('selected');
  }
  const btn = document.getElementById('devam-btn');
  btn.classList.toggle('visible', selectedWeeks.size > 0);
}

// ── CONFIG SCREEN ─────────────────────────────────────────────────────────────
function showConfig() {
  const body = document.getElementById('config-body');
  const weeks = WEEKS.filter(w => selectedWeeks.has(w.hafta));

  const rowsHtml = weeks.map(w => `
    <div class="config-week-row" style="--row-color:${w.color}">
      <div class="config-week-info">
        <div class="config-week-name">${w.label} — ${w.hafta}</div>
        <div class="config-week-sub">${w.sub}</div>
      </div>
      <div class="config-count-wrap">
        <input type="number" class="config-count-input"
          id="count-${w.hafta}" value="${w.count}"
          min="1" max="${w.count}" data-max="${w.count}">
        <span class="config-count-max">/ ${w.count} soru</span>
        <span class="config-count-err">1–${w.count} arası</span>
      </div>
    </div>`).join('');

  body.innerHTML = `
    <div>
      <div class="config-section-title">Hafta Başına Soru Sayısı</div>
      <div class="config-week-rows">${rowsHtml}</div>
    </div>
    <div class="config-toggle-row">
      <div>
        <div class="config-toggle-label">Soruları Karıştır</div>
        <div class="config-toggle-desc">Haftalar birbirine karışık gelir</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="shuffle-toggle" ${randomize ? 'checked' : ''}>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <button class="config-launch-btn" id="launch-btn">🎯 Sınavı Başlat</button>`;

  // Validate number inputs on change
  weeks.forEach(w => {
    const inp = document.getElementById(`count-${w.hafta}`);
    inp.addEventListener('input', () => {
      const v = parseInt(inp.value, 10);
      const max = parseInt(inp.dataset.max, 10);
      inp.classList.toggle('input-error', !v || v < 1 || v > max);
    });
  });

  document.getElementById('launch-btn').addEventListener('click', launchQuiz);
  showScreen('config');
}

// ── LAUNCH QUIZ (multi-week) ──────────────────────────────────────────────────
async function launchQuiz() {
  const weeks = WEEKS.filter(w => selectedWeeks.has(w.hafta));
  const configs = [];
  let hasError = false;

  weeks.forEach(w => {
    const inp = document.getElementById(`count-${w.hafta}`);
    const v   = parseInt(inp.value, 10);
    const max = parseInt(inp.dataset.max, 10);
    if (!v || v < 1 || v > max) {
      inp.classList.add('input-error'); hasError = true;
    } else {
      configs.push({ week: w, count: v });
    }
  });
  if (hasError) return;

  randomize           = document.getElementById('shuffle-toggle').checked;
  selectedWeekConfigs = configs;
  currentWeek         = configs.length === 1 ? configs[0].week : null;

  clearSession();
  allQuestions = [];
  userAnswers  = {};
  currentIdx   = 0;

  const title = quizTitle();
  document.getElementById('quiz-title').textContent = `🎯 ${title}`;
  document.getElementById('q-card').innerHTML = `
    <div style="text-align:center;padding:60px 20px;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:12px">⏳</div>
      <p>Sorular yükleniyor…</p>
    </div>`;
  showScreen('quiz');

  try {
    const results = await Promise.all(
      configs.map(c =>
        fetch(c.week.file)
          .then(r => { if (!r.ok) throw new Error(c.week.hafta + ': ' + r.status); return r.json(); })
      )
    );

    let merged = [];
    results.forEach((data, i) => {
      const sorted = data.sort((a, b) => a.id - b.id);
      merged = merged.concat(sorted.slice(0, configs[i].count));
    });

    if (randomize) {
      for (let i = merged.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [merged[i], merged[j]] = [merged[j], merged[i]];
      }
    }

    allQuestions = merged;
    saveSession(false);
    buildNavGrid();
    goToQuestion(0);
    updateProgress();
    if (isMobile()) document.getElementById('mob-nav').style.display = 'flex';
  } catch (err) {
    document.getElementById('q-card').innerHTML =
      `<p style="color:#c0392b;padding:40px 0">Sorular yüklenemedi: ${err}</p>`;
  }
}

// ── NAV GRID ─────────────────────────────────────────────────────────────────
function buildNavGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  allQuestions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-nav-btn';
    btn.textContent = i + 1;
    btn.dataset.idx = i;
    btn.addEventListener('click', () => {
      goToQuestion(i);
      if (isMobile()) closeNavPanel();
    });
    grid.appendChild(btn);
  });
}

function refreshNavGrid() {
  document.querySelectorAll('.q-nav-btn').forEach((btn, i) => {
    const qId = allQuestions[i]?.id;
    btn.classList.remove('current', 'answered');
    if (i === currentIdx) btn.classList.add('current');
    if (userAnswers[qId] !== undefined) btn.classList.add('answered');
  });
  // Scroll current button into view within the panel
  const cur = document.querySelector('.q-nav-btn.current');
  if (cur) cur.scrollIntoView({ block: 'nearest' });
}

// ── QUESTION RENDERING ────────────────────────────────────────────────────────
function goToQuestion(idx) {
  if (!allQuestions.length) return;
  currentIdx = Math.max(0, Math.min(idx, allQuestions.length - 1));
  refreshNavGrid();
  renderQuestion();
  saveSession(false);
  document.getElementById('q-main').scrollTo({ top: 0, behavior: 'smooth' });
  if (isMobile()) updateMobileNav();
}

function renderQuestion() {
  const q    = allQuestions[currentIdx];
  const sel  = userAnswers[q.id];
  const opts = Object.entries(q.options || {}).filter(([, v]) => v && String(v).trim());

  document.getElementById('q-card').innerHTML = `
    <div class="q-meta">
      <span class="q-num-badge">Soru ${currentIdx + 1} / ${allQuestions.length}</span>
      ${q.source ? `<span class="q-source-badge">${escHtml(q.source)}</span>` : ''}
    </div>
    <div class="q-text">${escHtmlWithBreaks(q.question)}</div>
    <div class="q-options">
      ${opts.map(([letter, text]) => `
        <button class="q-option${sel === letter ? ' selected' : ''}" data-letter="${letter}">
          <span class="q-opt-letter">${letter.toUpperCase()}</span>
          <span class="q-opt-text">${escHtml(text)}</span>
        </button>`).join('')}
    </div>
    <div class="q-nav-bar">
      <button class="q-nav-arrow" id="card-prev" ${currentIdx === 0 ? 'disabled' : ''}>← Önceki</button>
      <span class="q-nav-pos">${currentIdx + 1} / ${allQuestions.length}</span>
      <button class="q-nav-arrow" id="card-next" ${currentIdx === allQuestions.length - 1 ? 'disabled' : ''}>Sonraki →</button>
    </div>`;

  // Option click: record answer, update UI without full re-render
  const card = document.getElementById('q-card');
  card.querySelectorAll('.q-option').forEach(btn => {
    btn.addEventListener('click', () => {
      const letter = btn.dataset.letter;
      userAnswers[q.id] = letter;
      card.querySelectorAll('.q-option').forEach(o =>
        o.classList.toggle('selected', o.dataset.letter === letter));
      refreshNavGrid();
      updateProgress();
      saveSession(false);
      if (isMobile()) updateMobileNav();
    });
  });

  card.querySelector('#card-prev')?.addEventListener('click', () => goToQuestion(currentIdx - 1));
  card.querySelector('#card-next')?.addEventListener('click', () => goToQuestion(currentIdx + 1));
}

// ── PROGRESS BAR ─────────────────────────────────────────────────────────────
function updateProgress() {
  const answered = Object.keys(userAnswers).length;
  const total    = allQuestions.length;
  const pct      = total ? Math.round(answered / total * 100) : 0;
  document.getElementById('progress-text').textContent = `${answered}/${total} cevaplandı`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── MOBILE ───────────────────────────────────────────────────────────────────
function isMobile() { return window.innerWidth <= 768; }

function updateMobileNav() {
  document.getElementById('mob-prev').disabled = currentIdx === 0;
  document.getElementById('mob-next').disabled = !allQuestions.length || currentIdx >= allQuestions.length - 1;
}

const navPanel  = document.getElementById('nav-panel');
const navOverlay = document.getElementById('nav-overlay');

function openNavPanel()  { navPanel.classList.add('open'); navOverlay.classList.add('visible'); }
function closeNavPanel() { navPanel.classList.remove('open'); navOverlay.classList.remove('visible'); }

document.getElementById('nav-toggle').addEventListener('click', openNavPanel);
navOverlay.addEventListener('click', closeNavPanel);

document.getElementById('mob-prev').addEventListener('click', () => goToQuestion(currentIdx - 1));
document.getElementById('mob-next').addEventListener('click', () => goToQuestion(currentIdx + 1));
document.getElementById('mob-finish-btn').addEventListener('click', confirmFinish);

// ── FINISH / CONFIRM ─────────────────────────────────────────────────────────
const modal    = document.getElementById('confirm-modal');
const modalMsg = document.getElementById('modal-msg');

document.getElementById('finish-btn').addEventListener('click', confirmFinish);
document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));
document.getElementById('modal-overlay').addEventListener('click', () => modal.classList.remove('open'));
document.getElementById('modal-confirm').addEventListener('click', () => {
  modal.classList.remove('open');
  finishExam();
});

function confirmFinish() {
  const blank = allQuestions.length - Object.keys(userAnswers).length;
  if (blank === 0) { finishExam(); return; }
  modalMsg.textContent = `${blank} soru boş bırakıldı. Yine de sınavı bitirmek istiyor musunuz?`;
  modal.classList.add('open');
}

// ── FINISH EXAM ───────────────────────────────────────────────────────────────
function finishExam() {
  document.getElementById('mob-nav').style.display = 'none';
  closeNavPanel();

  let correct = 0, wrong = 0, blank = 0;
  const wrongItems = [];

  allQuestions.forEach(q => {
    const ua = userAnswers[q.id];
    const ca = (q.correct_answer || '').toLowerCase();

    if (!ua || !ca) {
      blank++;
    } else if (ua === ca) {
      correct++;
    } else {
      wrong++;
      wrongItems.push({ q, userAnswer: ua, correctAnswer: ca });
    }
  });

  wrongItemsStore = wrongItems;
  saveSession(true);
  buildResultsScreen(correct, wrong, blank, wrongItems);
  showScreen('results');
}

// ── RESULTS ───────────────────────────────────────────────────────────────────
function buildResultsScreen(correct, wrong, blank, wrongItems) {
  const total = allQuestions.length;
  const pct   = total ? Math.round(correct / total * 100) : 0;

  document.getElementById('results-title').textContent =
    `${quizTitle()} — Sonuç`;

  document.getElementById('results-body').innerHTML = `
    <div class="results-title">Sınav Tamamlandı 🎯</div>

    <div class="score-grid">
      <div class="score-card sc-correct">
        <div class="score-number">${correct}</div>
        <div class="score-label">✓ Doğru</div>
      </div>
      <div class="score-card sc-wrong">
        <div class="score-number">${wrong}</div>
        <div class="score-label">✗ Yanlış</div>
      </div>
      <div class="score-card sc-blank">
        <div class="score-number">${blank}</div>
        <div class="score-label">— Boş</div>
      </div>
    </div>

    <div class="score-summary">
      <span class="score-pct">%${pct} başarı oranı</span>
      ${total} soru &nbsp;·&nbsp; ${correct} doğru &nbsp;·&nbsp; ${wrong} yanlış &nbsp;·&nbsp; ${blank} boş
    </div>

    <div class="result-actions">
      <button class="retry-btn" id="retry-btn">🔄 Yeni Sınav Başlat</button>
      ${wrongItems.length > 0 ? `<button class="review-btn" id="review-btn">🔍 Yanlışlara Bak</button>` : ''}
      <button class="reset-btn" id="reset-btn">🗑 Sınavı Sıfırla</button>
    </div>`;

  function resetToSelect() {
    clearSession();
    allQuestions = []; userAnswers = {}; currentIdx = 0;
    currentWeek = null; wrongItemsStore = [];
    selectedWeeks = new Set(); selectedWeekConfigs = []; randomize = false;
    // Rebuild cards so selection state is cleared
    buildWeekSelect();
    document.getElementById('devam-btn').classList.remove('visible');
    showScreen('select');
  }

  document.getElementById('retry-btn').addEventListener('click', resetToSelect);
  document.getElementById('review-btn')?.addEventListener('click', openReview);
  document.getElementById('reset-btn')?.addEventListener('click', resetToSelect);
}

function buildWrongCard(q, userAnswer, correctAnswer) {
  const optAn  = q.option_analysis || {};
  const opts   = Object.entries(q.options || {}).filter(([, v]) => v && String(v).trim());
  const hasExp = !!q.explanation;

  // Options — rendered in fully-revealed state (no click needed)
  const optionsHtml = opts.map(([letter, text]) => {
    const isCorrect    = letter === correctAnswer;
    const isUserChoice = letter === userAnswer;
    let cls = 'option';
    if (isCorrect)    cls += ' revealed-correct';
    else if (isUserChoice) cls += ' revealed-wrong';
    if (isCorrect || isUserChoice) cls += ' show-analysis';
    const analysis = optAn[letter]
      ? `<div class="option-inline-analysis">${escHtmlBoldLabel(optAn[letter])}</div>` : '';
    return `
      <div class="${cls}">
        <div style="flex:1">
          <div style="display:flex;align-items:flex-start;gap:12px">
            <span class="option-letter">${letter.toUpperCase()}</span>
            <span class="option-text">${escHtml(text)}</span>
          </div>
          ${analysis}
        </div>
      </div>`;
  }).join('');

  const noteHtml   = q.note ? `<div class="note-box">${escHtml(q.note)}</div>` : '';
  const noticeHtml = hasExp ? '' :
    `<div class="no-exp-notice">⚠️ Bu soru için henüz açıklama yüklenmemiş.</div>`;

  // Accordion sections — identical logic to quiz.html
  const sections = [];

  if (hasExp) {
    sections.push({
      icon: '📖', title: 'Soru Açıklaması', open: true,
      html: `<div style="white-space:pre-wrap;line-height:1.75">${escHtml(cleanText(q.explanation))}</div>`
    });
  }

  if (Object.keys(optAn).length) {
    const items = Object.entries(optAn).map(([l, txt]) => `
      <div class="opt-analysis-item${l === correctAnswer ? ' is-correct' : ''}">
        <span class="opt-badge">${l.toUpperCase()}</span>
        <span class="opt-analysis-text">${escHtmlBoldLabel(txt)}</span>
      </div>`).join('');
    sections.push({ icon: '🔍', title: 'Şık Analizi', open: false,
      html: `<div class="opt-analysis-list">${items}</div>` });
  }

  const terms = (q.terms || []).filter(Boolean);
  if (terms.length) {
    const termsHtml = terms.map(t =>
      typeof t === 'object' && t.term
        ? `<div class="term-item">
             <span class="term-name">${escHtml(t.term)}</span>
             <span class="term-def">${escHtml(t.definition || '')}</span>
           </div>`
        : `<div class="term-item"><span class="term-name">${escHtml(String(t))}</span></div>`
    ).join('');
    sections.push({ icon: '🏷️', title: 'Önemli Terimler', open: false,
      html: `<div class="term-list">${termsHtml}</div>` });
  }

  // subtopics can be a string (H1) or array
  const rawSubs = q.subtopics;
  const subs = Array.isArray(rawSubs) ? rawSubs.filter(Boolean)
             : (rawSubs ? [{ title: 'Alt Konular', content: String(rawSubs) }] : []);
  if (subs.length) {
    const subsHtml = subs.map(s =>
      typeof s === 'object' && s.title
        ? `<div class="subtopic-item">
             <span class="subtopic-title">${escHtml(s.title)}</span>
             <span class="subtopic-content">${escHtml(cleanText(s.content || ''))}</span>
           </div>`
        : `<div class="subtopic-item"><span class="subtopic-title">${escHtml(String(s))}</span></div>`
    ).join('');
    sections.push({ icon: '🔗', title: 'Alt Konular', open: false,
      html: `<div class="subtopic-list">${subsHtml}</div>` });
  }

  if (q.exam_potential) {
    sections.push({ icon: '🎯', title: 'Sınav Potansiyeli', open: false,
      html: `<div class="exam-text">${formatNumberedList(cleanText(q.exam_potential))}</div>` });
  }

  const accordionHtml = sections.map(s => `
    <div class="acc-item">
      <button class="acc-trigger${s.open ? ' open' : ''}">
        <span><span class="acc-label-icon">${s.icon}</span>${s.title}</span>
        <span class="acc-icon">▾</span>
      </button>
      <div class="acc-body${s.open ? ' open' : ''}">${s.html}</div>
    </div>`).join('');

  return `
    <div class="review-q-wrap">
      <div class="review-q-inner">
        <div class="card-meta">
          <span class="card-num">Soru ${q.id}</span>
          ${q.source ? `<span class="card-source">${escHtml(q.source)}</span>` : ''}
        </div>
        <div class="card-question">${escHtmlWithBreaks(q.question)}</div>
        ${noteHtml}
        <div class="options-grid">${optionsHtml}</div>
        ${noticeHtml}
        ${sections.length ? `<div class="accordion">${accordionHtml}</div>` : ''}
      </div>
    </div>`;
}

// ── REVIEW SCREEN ────────────────────────────────────────────────────────────
function openReview() {
  reviewIdx = 0;
  document.getElementById('review-title').textContent =
    `Yanlış Sorular (${wrongItemsStore.length})`;
  buildReviewSidebar();
  selectReviewItem(0);
  // Sidebar: open on desktop, closed on mobile
  const sb = document.getElementById('review-sidebar');
  const ov = document.getElementById('review-sidebar-overlay');
  sb.classList.remove('collapsed', 'open');
  ov.classList.remove('visible');
  if (isMobile()) { /* stays closed — no 'open' class */ }
  else             { /* stays open — no 'collapsed' class */ }
  showScreen('review');
}

function buildReviewSidebar() {
  const list = document.getElementById('review-q-list');
  list.innerHTML = '';
  wrongItemsStore.forEach(({ q }, i) => {
    const item = document.createElement('div');
    item.className = 'rv-q-item' + (i === 0 ? ' active' : '');
    item.innerHTML = `
      <span class="rv-q-num">${q.id}</span>
      <span class="rv-q-text">${escHtml(q.question)}</span>
      <span class="rv-q-dot"></span>`;
    item.addEventListener('click', () => selectReviewItem(i));
    list.appendChild(item);
  });
}

function selectReviewItem(idx) {
  reviewIdx = idx;
  document.querySelectorAll('.rv-q-item').forEach((el, i) =>
    el.classList.toggle('active', i === idx));
  const cur = document.querySelector('.rv-q-item.active');
  if (cur) cur.scrollIntoView({ block: 'nearest' });

  const { q, userAnswer, correctAnswer } = wrongItemsStore[idx];
  const total = wrongItemsStore.length;
  document.getElementById('review-card').innerHTML =
    buildWrongCard(q, userAnswer, correctAnswer) + `
    <div class="rv-nav-bar">
      <button class="rv-nav-btn" id="rv-prev" ${idx === 0 ? 'disabled' : ''}>← Önceki</button>
      <span class="rv-nav-pos">${idx + 1} / ${total}</span>
      <button class="rv-nav-btn" id="rv-next" ${idx === total - 1 ? 'disabled' : ''}>Sonraki →</button>
    </div>`;

  document.getElementById('rv-prev')?.addEventListener('click', () => selectReviewItem(idx - 1));
  document.getElementById('rv-next')?.addEventListener('click', () => selectReviewItem(idx + 1));

  // Wire accordion toggles
  document.querySelectorAll('#review-card .acc-trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      const open = btn.classList.toggle('open');
      btn.nextElementSibling.classList.toggle('open', open);
    });
  });

  document.getElementById('review-main').scrollTo({ top: 0, behavior: 'smooth' });
}

function openReviewSidebar() {
  const sb = document.getElementById('review-sidebar');
  const ov = document.getElementById('review-sidebar-overlay');
  if (isMobile()) { sb.classList.add('open'); ov.classList.add('visible'); }
  else            { sb.classList.remove('collapsed'); }
}
function closeReviewSidebar() {
  const sb = document.getElementById('review-sidebar');
  const ov = document.getElementById('review-sidebar-overlay');
  if (isMobile()) { sb.classList.remove('open'); ov.classList.remove('visible'); }
  else            { sb.classList.add('collapsed'); }
}
function toggleReviewSidebar() {
  const sb = document.getElementById('review-sidebar');
  if (isMobile()) sb.classList.contains('open') ? closeReviewSidebar() : openReviewSidebar();
  else            sb.classList.contains('collapsed') ? openReviewSidebar() : closeReviewSidebar();
}
document.getElementById('review-sidebar-toggle').addEventListener('click', toggleReviewSidebar);
document.getElementById('review-sidebar-overlay').addEventListener('click', closeReviewSidebar);

document.getElementById('review-back-btn').addEventListener('click', () => showScreen('results'));

document.getElementById('devam-btn').addEventListener('click', () => {
  if (selectedWeeks.size > 0) showConfig();
});
document.getElementById('config-back-btn').addEventListener('click', () => showScreen('select'));

// ── NAVIGATION ────────────────────────────────────────────────────────────────
document.getElementById('quiz-back-btn').addEventListener('click', () => {
  const answered = Object.keys(userAnswers).length;
  if (answered > 0) {
    if (!confirm('Sınavdan çıkmak istediğinize emin misiniz? İlerlemeniz kaybolacak.')) return;
  }
  clearSession();
  document.getElementById('mob-nav').style.display = 'none';
  closeNavPanel();
  allQuestions = []; userAnswers = {}; currentIdx = 0;
  currentWeek = null;
  selectedWeeks = new Set(); selectedWeekConfigs = []; randomize = false;
  buildWeekSelect();
  document.getElementById('devam-btn').classList.remove('visible');
  showScreen('select');
});

document.getElementById('results-back-btn').addEventListener('click', () => {
  clearSession();
  allQuestions = []; userAnswers = {}; currentIdx = 0;
  currentWeek = null; wrongItemsStore = [];
  selectedWeeks = new Set(); selectedWeekConfigs = []; randomize = false;
  buildWeekSelect();
  document.getElementById('devam-btn').classList.remove('visible');
  showScreen('select');
});

// ── KEYBOARD NAV ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  if (document.getElementById('screen-quiz').classList.contains('active')) {
    if (modal.classList.contains('open')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goToQuestion(currentIdx + 1);
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goToQuestion(currentIdx - 1);
  }

  if (document.getElementById('screen-review').classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')
      selectReviewItem(Math.min(reviewIdx + 1, wrongItemsStore.length - 1));
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')
      selectReviewItem(Math.max(reviewIdx - 1, 0));
  }
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function escHtmlWithBreaks(str) {
  if (str == null) return '';
  return escHtml(str).replace(/\n/g, '<br>');
}
function escHtmlBoldLabel(str) {
  if (!str) return '';
  const idx = str.indexOf(':');
  if (idx === -1) return escHtml(str);
  return `<strong>${escHtml(str.slice(0, idx))}:</strong>${escHtml(str.slice(idx + 1))}`;
}
function cleanText(str) {
  if (!str) return '';
  return str
    .replace(/EXTREMELY IMPORTANT[\s\S]*$/i, '')
    .replace(/\[\d+\]/g, '')
    .replace(/\bmore_horiz\b/g, '')
    .trim();
}
function formatNumberedList(str) {
  if (!str) return '';
  return str.split(/(?=\d+\.\s)/)
    .map(p => escHtml(p.trim())).filter(p => p).join('<br><br>');
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildWeekSelect();
if (!restoreSession()) showScreen('select');
</script>
