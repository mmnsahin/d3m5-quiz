<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3 M5 — Çıkmış Sorular</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --sidebar-bg: #1a2744;
    --sidebar-hover: #243660;
    --sidebar-active: #2e4a8a;
    --accent: #2e4a8a;
    --accent-light: #e8eef8;
    --correct: #1a7f4b;
    --correct-bg: #eaf6ef;
    --text: #1c2b3a;
    --muted: #7a8fa6;
    --border: #dde4ed;
    --cat-color: #f0a500;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --sidebar-w: 300px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    background: var(--sidebar-bg);
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }

  /* Hamburger — shown only on mobile */
  #sidebar-toggle {
    display: none;
    background: none;
    border: none;
    color: #fff;
    font-size: 1.35rem;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    line-height: 1;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #sidebar-toggle:hover { background: rgba(255,255,255,0.12); }

  #progress-bar-wrap {
    display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #aac;
  }
  #progress-track {
    width: 140px; height: 6px; background: #2e4a8a; border-radius: 3px; overflow: hidden;
  }
  #progress-fill { height: 100%; background: #4caf88; border-radius: 3px; transition: width 0.3s; }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  /* ── Sidebar ── */
  aside {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    z-index: 100;
  }

  /* Mobile overlay — pointer-events:none when hidden so it never blocks taps */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 90;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  #sidebar-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #search-wrap {
    padding: 12px 14px;
    border-bottom: 1px solid #2e3f60;
    flex-shrink: 0;
  }
  #search {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: #243660;
    color: #d0d8f0;
    font-size: 0.85rem;
    outline: none;
  }
  #search::placeholder { color: #6a7fa0; }
  #search:focus { background: #2e4a8a; }

  #question-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: #2e4a8a transparent;
  }
  #question-list::-webkit-scrollbar { width: 4px; }
  #question-list::-webkit-scrollbar-thumb { background: #2e4a8a; border-radius: 2px; }

  .cat-header {
    padding: 10px 16px 4px;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cat-color);
    user-select: none;
  }

  .q-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .q-item:hover { background: var(--sidebar-hover); }
  .q-item.active { background: var(--sidebar-active); border-left-color: #4caf88; }
  .q-item.no-explanation { opacity: 0.45; }

  .q-num {
    font-size: 0.7rem;
    font-weight: 700;
    color: #8a9fc0;
    min-width: 22px;
    text-align: right;
  }
  .q-item.active .q-num { color: #a0c4ff; }

  .q-text {
    font-size: 0.78rem;
    color: #c8d4e8;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .q-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: #4caf88;
    margin-left: auto;
  }
  .q-item.no-explanation .q-dot { background: #4a5a70; }

  /* ── Main content ── */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    scrollbar-width: thin;
    scrollbar-color: #c0ccd8 transparent;
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: #c0ccd8; border-radius: 3px; }

  /* ── Empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--muted);
    gap: 12px;
  }
  #empty-state svg { opacity: 0.25; }
  #empty-state p { font-size: 0.95rem; }

  /* ── Question card ── */
  #question-card { display: none; max-width: 820px; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .card-num {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .card-source {
    background: #f0f4f8;
    border: 1px solid #c8d4e0;
    color: #5a6f88;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    font-family: monospace;
    white-space: nowrap;
  }
  .card-category {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--cat-color);
  }
  .card-question {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
    margin-top: 6px;
  }

  /* ── Options ── */
  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-size: 0.9rem;
    line-height: 1.45;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
    user-select: none;
  }
  .option:hover:not(.answered) { border-color: #a0b4d0; background: #f5f8fc; }
  .option.answered { cursor: default; }
  .option.revealed-correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.revealed-wrong {
    border-color: #c0392b;
    background: #fdf0ee;
  }
  .option-letter {
    font-weight: 700;
    font-size: 0.8rem;
    min-width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-light);
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.15s, color 0.15s;
  }
  .option.revealed-correct .option-letter { background: var(--correct); color: #fff; }
  .option.revealed-wrong .option-letter   { background: #c0392b; color: #fff; }
  .option-text { flex: 1; font-weight: 600; }

  /* Inline analysis shown below option after answering */
  .option-inline-analysis {
    display: none;
    margin-top: 6px;
    padding: 8px 10px;
    background: rgba(0,0,0,0.04);
    border-radius: 6px;
    font-size: 0.82rem;
    line-height: 1.55;
    color: #2c3e50;
    border-left: 3px solid #aab;
  }
  .option.revealed-correct .option-inline-analysis { border-left-color: var(--correct); background: rgba(26,127,75,0.06); }
  .option.revealed-wrong   .option-inline-analysis { border-left-color: #c0392b; background: rgba(192,57,43,0.06); }
  .option.answered.show-analysis .option-inline-analysis { display: block; }

  /* ── No explanation notice ── */
  .no-exp-notice {
    background: #fff8e6;
    border: 1.5px solid #f0c060;
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 0.88rem;
    color: #7a5a00;
    margin-bottom: 24px;
  }

  /* ── Note ── */
  .note-box {
    background: #f5f0ff;
    border: 1.5px solid #c8a8f0;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 0.85rem;
    color: #4a2880;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .note-box::before { content: "📝 Not: "; font-weight: 700; }

  /* ── Accordion ── */
  .accordion { display: flex; flex-direction: column; gap: 10px; }

  .acc-item {
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .acc-trigger {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: background 0.15s;
  }
  .acc-trigger:hover { background: var(--accent-light); }
  .acc-trigger.open { color: var(--accent); background: var(--accent-light); }

  .acc-icon {
    font-size: 1.1rem;
    transition: transform 0.2s;
    color: var(--muted);
    flex-shrink: 0;
  }
  .acc-trigger.open .acc-icon { transform: rotate(180deg); color: var(--accent); }
  .acc-label-icon { margin-right: 8px; }

  .acc-body {
    display: none;
    padding: 16px 18px;
    border-top: 1.5px solid var(--border);
    font-size: 0.88rem;
    line-height: 1.7;
    color: #2c3e50;
  }
  .acc-body.open { display: block; }

  /* Option analysis list */
  .opt-analysis-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .opt-analysis-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 12px; border-radius: 6px; background: var(--bg);
  }
  .opt-analysis-item.is-correct { background: var(--correct-bg); }
  .opt-badge {
    font-weight: 700; font-size: 0.78rem;
    min-width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #dde4ed; color: #555; flex-shrink: 0;
  }
  .opt-analysis-item.is-correct .opt-badge { background: var(--correct); color: #fff; }
  .opt-analysis-text { font-size: 0.85rem; line-height: 1.55; }

  /* Terms list */
  .term-list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .term-item { display: flex; flex-direction: column; gap: 2px; }
  .term-name { font-weight: 700; font-size: 0.85rem; color: var(--accent); }
  .term-def  { font-size: 0.84rem; line-height: 1.6; color: #2c3e50; }

  /* Subtopics list */
  .subtopic-list { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
  .subtopic-item { display: flex; flex-direction: column; gap: 4px; }
  .subtopic-title   { font-weight: 700; font-size: 0.85rem; color: #6a3db8; }
  .subtopic-content { font-size: 0.84rem; line-height: 1.65; color: #2c3e50; white-space: pre-wrap; }

  /* Exam potential */
  .exam-text { white-space: pre-wrap; font-size: 0.86rem; line-height: 1.7; color: #2c3e50; }

  /* Nav buttons */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1.5px solid var(--border);
  }
  .nav-btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: var(--surface);
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .nav-btn:hover { background: var(--accent); color: #fff; }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .nav-btn:disabled:hover { background: var(--surface); color: var(--accent); }
  .nav-pos { font-size: 0.82rem; color: var(--muted); }

  /* ── Mobile bottom nav ── */
  #mobile-nav {
    display: none;
  }
  @media (max-width: 768px) {
    #sidebar-toggle { display: flex; align-items: center; justify-content: center; }

    aside {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      transform: translateX(-100%);
      /* Push it below header */
      padding-top: 56px;
    }
    aside.open { transform: translateX(0); }

    main {
      padding: 16px;
      padding-bottom: 80px; /* space for mobile-nav */
    }

    header { padding: 12px 16px; }
    header h1 { font-size: 0.9rem; }

    #progress-track { width: 90px; }
    #progress-text { display: none; }

    .card-question { font-size: 0.96rem; }

    /* Sticky bottom nav — shown on mobile when a question is selected */
    #mobile-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      padding: 10px 16px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 80;
      visibility: hidden;
    }
    #mobile-nav.active { visibility: visible; }

    .mob-nav-btn {
      flex: 1;
      padding: 10px 0;
      border-radius: 8px;
      border: 1.5px solid var(--accent);
      background: var(--surface);
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: center;
    }
    .mob-nav-btn:active { background: var(--accent); color: #fff; }
    .mob-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .mob-nav-pos {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
      text-align: center;
      min-width: 48px;
    }
  }
</style>
</head>
<body>

<!-- Mobile overlay -->
<div id="sidebar-overlay"></div>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="sidebar-toggle" aria-label="Soruları aç/kapat">☰</button>
    <a href="index.html" style="color:#8ab4f8;font-size:0.85rem;text-decoration:none;opacity:0.8">← Geri</a>
    <h1 id="page-title">📚 D3 · M5 — Çıkmış Sorular</h1>
  </div>
  <div id="progress-bar-wrap">
    <span id="progress-text">0/0 açıklamalı</span>
    <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
  </div>
</header>

<!-- Mobile sticky bottom navigation -->
<div id="mobile-nav">
  <button class="mob-nav-btn" id="mob-btn-prev">← Önceki</button>
  <span class="mob-nav-pos" id="mob-nav-pos"></span>
  <button class="mob-nav-btn" id="mob-btn-next">Sonraki →</button>
</div>

<div class="layout">
  <aside id="sidebar">
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Soru ara..." autocomplete="off">
    </div>
    <div id="question-list"></div>
  </aside>

  <main>
    <div id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <p>Sol taraftan bir soru seçin</p>
    </div>
    <div id="question-card"></div>
  </main>
</div>

<script>
// ── URL params ────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const jsonFile = params.get('file') || 'questions.json';
const hafta    = params.get('hafta') || 'H3';
document.getElementById('page-title').textContent = `📚 D3 · M5 · ${hafta} — Çıkmış Sorular`;
document.title = `D3 M5 ${hafta} — Çıkmış Sorular`;

// ── Mobile sidebar toggle ─────────────────────────────────────────────────────
const sidebar  = document.getElementById('sidebar');
const overlay  = document.getElementById('sidebar-overlay');
const toggleBtn = document.getElementById('sidebar-toggle');

function openSidebar() {
  overlay.style.display = 'block';
  // Allow display:block to paint before starting opacity transition
  requestAnimationFrame(() => {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
  });
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('visible');
  document.body.style.overflow = '';
  // Hide overlay after fade-out so pointer-events are truly gone
  overlay.addEventListener('transitionend', function hide() {
    overlay.style.display = 'none';
    overlay.removeEventListener('transitionend', hide);
  });
}
function isMobile() { return window.innerWidth <= 768; }

toggleBtn.addEventListener('click', () => {
  sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
});
overlay.addEventListener('click', closeSidebar);

// ── Category map ─────────────────────────────────────────────────────────────
const CATEGORIES_H2 = [
  { label: 'Gastroenteroloji',  ids: Array.from({length:22}, (_,i)=>i+1)  },
  { label: 'Patoloji',          ids: Array.from({length:15}, (_,i)=>i+23) },
  { label: 'Fizyopatoloji',     ids: Array.from({length:18}, (_,i)=>i+38) },
  { label: 'Nefroloji',         ids: Array.from({length:9},  (_,i)=>i+56) },
  { label: 'Üroloji',           ids: Array.from({length:8},  (_,i)=>i+65) },
  { label: 'Genetik',           ids: Array.from({length:13}, (_,i)=>i+73) },
];
const CATEGORIES_H3 = [
  { label: 'Fizyopatoloji',     ids: Array.from({length:29}, (_,i)=>i+1)  },
  { label: 'Patoloji',          ids: Array.from({length:36}, (_,i)=>i+30) },
  { label: 'Gastroenteroloji',  ids: Array.from({length:10}, (_,i)=>i+66) },
  { label: 'Farmakoloji',       ids: Array.from({length:7},  (_,i)=>i+76) },
  { label: 'Enfeksiyon',        ids: Array.from({length:5},  (_,i)=>i+83) },
];
const CATEGORIES_H1 = [
  { label: 'Nefroloji',         ids: Array.from({length:54}, (_,i)=>i+1)  },
  { label: 'Fizyopatoloji',     ids: Array.from({length:57}, (_,i)=>i+55) },
];
const CATEGORIES = hafta === 'H2' ? CATEGORIES_H2 : hafta === 'H1' ? CATEGORIES_H1 : CATEGORIES_H3;
function categoryOf(id) {
  return CATEGORIES.find(c => c.ids.includes(id))?.label ?? 'Diğer';
}

// ── State ─────────────────────────────────────────────────────────────────────
let questions = [];
let filtered  = [];
let currentId = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
fetch(jsonFile)
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(data => {
    questions = data.sort((a,b) => a.id - b.id);
    filtered  = questions;
    buildSidebar();
    updateProgress();
  })
  .catch(err => {
    document.getElementById('empty-state').innerHTML =
      `<p style="color:#c0392b">questions.json yüklenemedi.<br>Bir HTTP sunucusu üzerinden açın.<br><small>${err}</small></p>`;
  });

// ── Progress ──────────────────────────────────────────────────────────────────
function updateProgress() {
  const total = questions.length;
  const done  = questions.filter(q => q.explanation).length;
  const pct   = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-text').textContent = `${done}/${total} açıklamalı`;
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function buildSidebar() {
  const list = document.getElementById('question-list');
  list.innerHTML = '';

  const groups = {};
  filtered.forEach(q => {
    const cat = categoryOf(q.id);
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(q);
  });

  const allCats = [...CATEGORIES];
  if (groups['Diğer']?.length > 0) allCats.push({ label: 'Diğer' });

  allCats.forEach(cat => {
    const qs = groups[cat.label];
    if (!qs || qs.length === 0) return;

    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.textContent = `${cat.label} (${qs.length})`;
    list.appendChild(hdr);

    qs.forEach(q => {
      const item = document.createElement('div');
      item.className = 'q-item' + (q.explanation ? '' : ' no-explanation') + (q.id === currentId ? ' active' : '');
      item.dataset.id = q.id;
      item.innerHTML = `
        <span class="q-num">${q.id}</span>
        <span class="q-text">${escHtmlWithBreaks(q.question)}</span>
        <span class="q-dot"></span>`;
      item.addEventListener('click', () => {
        selectQuestion(q.id);
        if (isMobile()) closeSidebar();
      });
      list.appendChild(item);
    });
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const term = this.value.trim().toLowerCase();
  filtered = term
    ? questions.filter(q =>
        q.question.toLowerCase().includes(term) ||
        String(q.id).includes(term) ||
        (q.source || '').toLowerCase().includes(term) ||
        categoryOf(q.id).toLowerCase().includes(term))
    : questions;
  buildSidebar();
});

// ── Select question ───────────────────────────────────────────────────────────
function selectQuestion(id) {
  currentId = id;
  const q = questions.find(q => q.id === id);
  if (!q) return;

  document.querySelectorAll('.q-item').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.id) === id);
  });
  const activeEl = document.querySelector('.q-item.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest' });

  renderCard(q);
}

// ── Render card ───────────────────────────────────────────────────────────────
function renderCard(q) {
  const empty = document.getElementById('empty-state');
  const card  = document.getElementById('question-card');
  empty.style.display = 'none';
  card.style.display  = 'block';

  const cat     = categoryOf(q.id);
  const hasExp  = !!q.explanation;
  const correctSet = new Set((q.correct_answer || '').toLowerCase().split(',').map(s => s.trim()).filter(Boolean));
  const correct    = [...correctSet].join(','); // kept for display compat
  const optAn      = q.option_analysis || {};

  // Source badge
  const sourceBadge = q.source
    ? `<span class="card-source">${escHtml(q.source)}</span>`
    : '';

  // Optional note
  const noteHtml = q.note
    ? `<div class="note-box">${escHtml(q.note)}</div>`
    : '';

  // Options — each includes a hidden inline-analysis div revealed on answer
  const optionsHtml = Object.entries(q.options || {}).map(([letter, text]) => {
    const analysis = optAn[letter] ? `<div class="option-inline-analysis">${escHtmlBoldLabel(optAn[letter])}</div>` : '';
    return `<div class="option" data-letter="${letter}">
      <div style="flex:1">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <span class="option-letter">${letter.toUpperCase()}</span>
          <span class="option-text">${escHtml(text)}</span>
        </div>
        ${analysis}
      </div>
    </div>`;
  }).join('');

  // No-explanation notice
  const noticeHtml = hasExp ? '' : `
    <div class="no-exp-notice">
      ⚠️ Bu soru için henüz açıklama yüklenmemiş.
    </div>`;

  // Accordion sections
  const sections = [];

  if (hasExp) {
    sections.push({
      icon: '📖', title: 'Soru Açıklaması', open: false,
      html: `<div style="white-space:pre-wrap;line-height:1.75">${escHtml(cleanText(q.explanation))}</div>`
    });
  }

  if (Object.keys(optAn).length > 0) {
    const items = Object.entries(optAn).map(([l, txt]) => `
      <div class="opt-analysis-item${l === correct ? ' is-correct' : ''}">
        <span class="opt-badge">${l.toUpperCase()}</span>
        <span class="opt-analysis-text">${escHtmlBoldLabel(txt)}</span>
      </div>`).join('');
    sections.push({
      icon: '🔍', title: 'Şık Analizi', open: false,
      html: `<div class="opt-analysis-list">${items}</div>`
    });
  }

  const terms = (q.terms || []).filter(Boolean);
  if (terms.length) {
    const termsHtml = terms.map(t =>
      typeof t === 'object' && t.term
        ? `<div class="term-item">
            <span class="term-name">${escHtml(t.term)}</span>
            <span class="term-def">${escHtml(t.definition || '')}</span>
           </div>`
        : `<div class="term-item"><span class="term-name">${escHtml(String(t))}</span></div>`
    ).join('');
    sections.push({
      icon: '🏷️', title: 'Önemli Terimler', open: false,
      html: `<div class="term-list">${termsHtml}</div>`
    });
  }

  const rawSubs = q.subtopics;
  const subs = Array.isArray(rawSubs) ? rawSubs.filter(Boolean)
             : (rawSubs ? [{ title: 'Alt Konular', content: String(rawSubs) }] : []);
  if (subs.length) {
    const subsHtml = subs.map(s =>
      typeof s === 'object' && s.title
        ? `<div class="subtopic-item">
            <span class="subtopic-title">${escHtml(s.title)}</span>
            <span class="subtopic-content">${escHtml(cleanText(s.content || ''))}</span>
           </div>`
        : `<div class="subtopic-item"><span class="subtopic-title">${escHtml(String(s))}</span></div>`
    ).join('');
    sections.push({
      icon: '🔗', title: 'Alt Konular', open: false,
      html: `<div class="subtopic-list">${subsHtml}</div>`
    });
  }

  if (q.exam_potential) {
    sections.push({
      icon: '🎯', title: 'Soru Potansiyeli', open: false,
      html: `<div class="exam-text">${formatNumberedList(cleanText(q.exam_potential))}</div>`
    });
  }

  const accordionHtml = sections.map((s, i) => `
    <div class="acc-item">
      <button class="acc-trigger${s.open ? ' open' : ''}" data-idx="${i}">
        <span><span class="acc-label-icon">${s.icon}</span>${s.title}</span>
        <span class="acc-icon">▾</span>
      </button>
      <div class="acc-body${s.open ? ' open' : ''}">${s.html}</div>
    </div>`).join('');

  // Nav
  const allIds = questions.map(q => q.id);
  const pos    = allIds.indexOf(q.id);
  const prevId = pos > 0 ? allIds[pos-1] : null;
  const nextId = pos < allIds.length-1 ? allIds[pos+1] : null;

  card.innerHTML = `
    <div class="card-header">
      <div style="flex:1">
        <div class="card-meta">
          <span class="card-num">Soru ${q.id}</span>
          ${sourceBadge}
          <span class="card-category">${cat}</span>
        </div>
        <div class="card-question">${escHtmlWithBreaks(q.question)}</div>
      </div>
    </div>
    ${noteHtml}
    <div class="options-grid">${optionsHtml}</div>
    ${noticeHtml}
    ${sections.length ? `<div class="accordion">${accordionHtml}</div>` : ''}
    <div class="nav-bar">
      <button class="nav-btn" id="btn-prev" ${prevId===null?'disabled':''}>← Önceki</button>
      <span class="nav-pos">${pos+1} / ${allIds.length}</span>
      <button class="nav-btn" id="btn-next" ${nextId===null?'disabled':''}>Sonraki →</button>
    </div>`;

  // Option click — reveal correct/wrong + inline analysis for chosen option
  let answered = false;
  card.querySelectorAll('.option').forEach(opt => {
    opt.addEventListener('click', () => {
      if (answered) return;
      answered = true;
      const chosen = opt.dataset.letter;

      const isCorrectChoice = correctSet.has(chosen);
      card.querySelectorAll('.option').forEach(o => {
        o.classList.add('answered');
        if (correctSet.has(o.dataset.letter)) {
          o.classList.add('revealed-correct');
        } else if (o.dataset.letter === chosen && !isCorrectChoice) {
          o.classList.add('revealed-wrong');
        }
        // Show inline analysis for the chosen option and all correct options
        if (o.dataset.letter === chosen || correctSet.has(o.dataset.letter)) {
          o.classList.add('show-analysis');
        }
      });

      // Auto-open explanation accordion
      if (hasExp) {
        const firstBody = card.querySelector('.acc-body');
        const firstBtn  = card.querySelector('.acc-trigger');
        if (firstBody && !firstBody.classList.contains('open')) {
          firstBody.classList.add('open');
          firstBtn.classList.add('open');
        }
      }

      // Scroll to show explanation
      setTimeout(() => {
        const acc = card.querySelector('.accordion');
        if (acc) acc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 120);
    });
  });

  // Accordion toggles
  card.querySelectorAll('.acc-trigger').forEach(btn => {
    btn.addEventListener('click', () => {
      const body = btn.nextElementSibling;
      const open = btn.classList.toggle('open');
      body.classList.toggle('open', open);
    });
  });

  // Nav (in-card)
  card.querySelector('#btn-prev')?.addEventListener('click', () => prevId && selectQuestion(prevId));
  card.querySelector('#btn-next')?.addEventListener('click', () => nextId && selectQuestion(nextId));

  // Mobile sticky bottom nav
  const mobileNav = document.getElementById('mobile-nav');
  const mobPrev   = document.getElementById('mob-btn-prev');
  const mobNext   = document.getElementById('mob-btn-next');
  const mobPos    = document.getElementById('mob-nav-pos');
  mobileNav.classList.add('active');
  mobPos.textContent = `${pos+1} / ${allIds.length}`;
  mobPrev.disabled = prevId === null;
  mobNext.disabled = nextId === null;
  mobPrev.onclick = () => prevId && selectQuestion(prevId);
  mobNext.onclick = () => nextId && selectQuestion(nextId);

  // Scroll to top
  document.querySelector('main').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Keyboard navigation ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const ids = questions.map(q => q.id);
  const pos = ids.indexOf(currentId);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (pos < ids.length-1) selectQuestion(ids[pos+1]);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (pos > 0) selectQuestion(ids[pos-1]);
  } else if (e.key === 'Escape' && isMobile()) {
    closeSidebar();
  }
});

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function escHtmlBoldLabel(str) {
  if (!str) return '';
  // Handle **bold** normal format
  const m = str.match(/^\*\*(.+?)\*\*\s*([\s\S]*)$/);
  if (m) return `<strong>${escHtml(m[1])}</strong> ${escHtml(m[2])}`;
  // Fallback: bold up to first colon
  const idx = str.indexOf(':');
  if (idx === -1) return escHtml(str);
  return `<strong>${escHtml(str.slice(0, idx))}:</strong>${escHtml(str.slice(idx + 1))}`;
}
function formatNumberedList(str) {
  if (!str) return '';
  const parts = str.split(/(?=\d+\.\s)/);
  return parts.map(p => escHtml(p.trim())).filter(p => p).join('<br><br>');
}
function escHtmlWithBreaks(str) {
  if (!str) return '';
  return escHtml(str).replace(/\n/g, '<br>');
}

function cleanText(str) {
  if (!str) return '';
  return str
    .replace(/EXTREMELY IMPORTANT[\s\S]*$/i, '')
    .replace(/\[\d+\]/g, '')
    .replace(/\bmore_horiz\b/g, '')
    .trim();
}
